dataset_id: cifar100-unseen-classes
description: CIFAR-100 with 80/20 seen/unseen split for contrastive learning generalization study
split_version: split-2026-04-a

splits:
  train_seen:
    classes: 80
    images_per_class: 400
    total_images: 32000
  val_seen:
    classes: 80
    images_per_class: 100
    total_images: 8000
  test_seen:
    classes: 80
    images_per_class: 100
    total_images: 8000
  test_unseen:
    classes: 20
    images_per_class: 100
    total_images: 2000

seed_options:
  - 42
  - 123
  - 456
  - 789
  - 1024

class_structure:
  train_seen_base_classes: 80
  test_unseen_holdout_classes: 20
  fine_grained_labels: true
  coarse_grained_labels: true
