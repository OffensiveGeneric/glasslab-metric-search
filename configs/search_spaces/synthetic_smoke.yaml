# Synthetic smoke test config: tests the full workflow without internet
# Uses simple MLP on random feature tensors (64-dim) instead of real images

workflow_family: synthetic-smoke-test
search_space_id: synthetic-smoke-test-v0
data:
  dataset: synthetic-smoke
dataset:
  split_version: smoke-test-v0
  train_uri: s3://dummy/train
  val_uri: s3://dummy/val
  test_uri: s3://dummy/test
  # No S3 URIs needed - synthetic data is generated locally
resources:
  gpu_count: 0  # CPU only for local smoke tests
  cpu_count: 2
  memory_gb: 4
budget:
  max_epochs: 1
  max_wallclock_minutes: 5
  max_train_batches: 2
  max_eval_batches: 2
experiment:
  pipeline: contrastive_learning
  dataset_uri: null
  model_family: synthetic_contrastive
  training_notes: "Synthetic smoke test: simple MLP on random features, no internet"
  evaluation_target: Local pipeline validation
  validation_strategy: train_val_test_split
  loss_name: contrastive
  margin: 0.1
  temperature: 0.1
  batch_size: 4
  learning_rate: 0.001
  backbone_name: mlp
  max_epochs: 1
  num_classes: 10
  samples_per_class: 2
  input_dim: 64  # Synthetic dataset feature dimension
  hidden_dim: 128
  embedding_dim: 64
search_space:
  mutable_fields:
    model_family: [mlp_contrastive]
    loss_name: [contrastive]
    margin: [0.1]
    temperature: [0.1]
    batch_size: [4, 8]
    learning_rate: [0.001, 0.0001]
    backbone_name: [synthetic]
    max_epochs: [1]
