name: contrastive_cifar100
description: Contrastive augmentation pipeline for CIFAR-100 seen/unseen class generalization

transforms:
  - name: random_resized_crop
    params:
      size: [32, 32]
      scale: [0.2, 1.0]
      ratio: [0.75, 1.333333333]
      interpolation: 2
  - name: random_horizontal_flip
    params:
      p: 0.5
  - name: color_jitter
    params:
      brightness: [0.4, 0.4, 0.4, 0.1]
      contrast: [0.4, 0.4, 0.4, 0.1]
      saturation: [0.4, 0.4, 0.4, 0.1]
      hue: [0.1, 0.1, 0.1, 0.05]
      p: 0.8
  - name: random_grayscale
    params:
      p: 0.2

augmentation_strategy:
  two_view: true
  strong_augmentation: true
  normalize:
    mean: [0.5071, 0.4865, 0.4409]
    std: [0.2673, 0.2564, 0.2762]
